location = /agent-os {
    return 301 /agent-os/;
}

location = /agent-os/ {
    alias /var/www/agent-os/dist/;
    index index.html;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}

location = /agent-os/index.html {
    alias /var/www/agent-os/dist/index.html;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options nosniff always;
}

location = /_agent_os_auth {
    internal;
    proxy_pass http://127.0.0.1:3000/api/auth/me;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
}

location ^~ /agent-os/runtime/ {
    auth_request /_agent_os_auth;
    proxy_pass http://127.0.0.1:8787/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

location ^~ /agent-os/ {
    alias /var/www/agent-os/dist/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options nosniff always;
}
